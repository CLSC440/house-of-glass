<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Of Glass | Cloud Server</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#121926',
                        brandGold: '#D4AF37',
                        darkBg: '#030712',
                        darkCard: '#111827',
                        awsOrange: '#ff9900'
                    },
                    fontFamily: {
                        arabic: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }

        function applySmartTheme() {
            const manualTheme = localStorage.getItem('darkMode');
            if (manualTheme === 'true') document.documentElement.classList.add('dark');
            else if (manualTheme === 'false') document.documentElement.classList.remove('dark');
            else {
                const hour = new Date().getHours();
                if (hour < 6 || hour >= 18) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }
        }
        applySmartTheme();
    </script>
</head>
<body class="bg-gray-50 dark:bg-darkBg font-sans text-gray-800 dark:text-gray-200 transition-colors duration-300">

    <header class="bg-white dark:bg-brandBlue border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 h-16 md:h-20 flex justify-between items-center relative">
            <div class="flex items-center space-x-2 md:space-x-4">
                <a href="admin.html" class="flex items-center space-x-2 md:space-x-3 group">
                    <img src="logo.png" alt="Logo" class="h-16 md:h-20 w-auto transition-all group-hover:scale-105">
                    <div class="flex flex-col">
                        <span class="text-xl md:text-2xl font-black text-brandBlue dark:text-brandGold tracking-tighter leading-none italic uppercase">Admin</span>
                        <span class="text-[8px] md:text-[10px] text-brandBlue/60 dark:text-brandGold/60 font-medium tracking-[0.2em] uppercase block">AWS Cloud Server</span>
                    </div>
                </a>
            </div>
            <div class="flex gap-2">
                <a href="admin.html" class="px-4 py-2 bg-brandBlue text-white rounded-full text-xs font-bold hover:bg-brandGold transition-colors">
                    &larr; Back to Admin
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-black text-brandBlue dark:text-awsOrange uppercase italic tracking-tighter mb-4 text-center" dir="rtl">
            ☁️ Cloud Server Status <span class="text-sm font-arabic block mt-2 text-gray-500">حالة السيرفر السحابي (AWS)</span>
        </h1>

        <!-- Server Switcher Tabs -->
        <div class="flex justify-center mb-8">
            <div class="bg-gray-200 dark:bg-gray-800 p-1.5 rounded-xl inline-flex gap-1">
                <a href="server-status.html" class="px-6 py-2 rounded-lg text-sm font-bold transition-all text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                    Local Server
                </a>
                <a href="cloud-server-status.html" class="px-6 py-2 rounded-lg text-sm font-bold transition-all bg-white dark:bg-darkCard text-awsOrange shadow-sm pointer-events-none">
                    AWS Server
                </a>
            </div>
        </div>

        <!-- Overall Status Banner -->
        <div id="statusBanner" class="p-6 rounded-2xl bg-gray-100 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 flex items-center gap-4 mb-8 transition-all">
            <div class="w-4 h-4 rounded-full bg-blue-500 animate-pulse flex-shrink-0" id="statusPulse"></div>
            <div>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-lg" id="serverStateText">Connecting to AWS...</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400" id="lastUpdatedText">Waiting for data...</p>
            </div>
            <div class="ml-auto">
                <button onclick="fetchServerStatus()" class="px-4 py-2 bg-awsOrange hover:bg-yellow-600 text-white text-sm font-bold rounded-xl transition-all shadow-sm">
                    Refresh
                </button>
            </div>
        </div>

        <!-- Metrics Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8 lg:mb-12">
            <!-- CPU Card -->
            <div class="bg-white dark:bg-darkCard p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 relative overflow-hidden">
                <div class="flex justify-between items-center mb-4 relative z-10">
                    <h3 class="font-medium text-gray-500 dark:text-gray-400 text-sm">CPU Load</h3>
                    <svg class="w-6 h-6 text-awsOrange" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                </div>
                <div class="text-3xl font-black text-brandBlue dark:text-white relative z-10" id="cpuUsage">--%</div>
                <p class="text-xs text-gray-400 mt-2 relative z-10" id="cpuStatus">--</p>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mt-4 relative z-10">
                    <div class="bg-awsOrange h-2 rounded-full transition-all duration-500" id="cpuBar" style="width: 0%"></div>
                </div>
            </div>

            <!-- RAM Card -->
            <div class="bg-white dark:bg-darkCard p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-medium text-gray-500 dark:text-gray-400 text-sm">Memory (RAM)</h3>
                    <svg class="w-6 h-6 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <div class="text-3xl font-black text-brandBlue dark:text-white" id="ramUsage">-- / --</div>
                <p class="text-xs text-gray-400 mt-2" id="ramPercent">--% used</p>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mt-2">
                    <div class="bg-teal-400 h-2 rounded-full transition-all duration-500" id="ramBar" style="width: 0%"></div>
                </div>
            </div>

            <!-- Disk Card -->
            <div class="bg-white dark:bg-darkCard p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-medium text-gray-500 dark:text-gray-400 text-sm">Disk Storage</h3>
                    <svg class="w-6 h-6 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                </div>
                <div class="text-3xl font-black text-brandBlue dark:text-white" id="diskUsage">-- / --</div>
                <p class="text-xs text-gray-400 mt-2" id="diskPercent">--% used</p>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mt-2">
                    <div class="bg-rose-500 h-2 rounded-full transition-all duration-500" id="diskBar" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Details Section -->
        <div class="bg-white dark:bg-darkCard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50 flex justify-between items-center">
                <h3 class="font-bold text-gray-800 dark:text-gray-200">Raw Data Payload</h3>
            </div>
            <div class="p-6">
                <pre id="jsonViewer" class="bg-gray-900 text-awsOrange p-4 rounded-xl text-sm overflow-x-auto h-64 font-mono">Loading data...</pre>
            </div>
        </div>
    </main>

    <script>
        async function fetchServerStatus() {
            try {
                const response = await fetch('/api/server-status');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                renderData(data);
                
            } catch (error) {
                console.error('Error fetching server status:', error);
                
                const banner = document.getElementById('statusBanner');
                banner.className = "p-6 rounded-2xl bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 flex items-center gap-4 mb-8";
                
                document.getElementById('statusPulse').className = "w-4 h-4 rounded-full bg-red-500 animate-pulse flex-shrink-0";
                
                const text = document.getElementById('serverStateText');
                text.innerText = "Connection Failed / Server Offline";
                text.className = "font-bold text-red-800 dark:text-red-400 text-lg";
                
                document.getElementById('lastUpdatedText').innerText = "Fetch failed";
                document.getElementById('jsonViewer').innerText = "Error: " + error.message;
            }
        }

        function renderData(data) {
            // Update Banner
            const banner = document.getElementById('statusBanner');
            banner.className = "p-6 rounded-2xl bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 flex items-center gap-4 mb-8";
            document.getElementById('statusPulse').className = "w-4 h-4 rounded-full bg-green-500 animate-pulse flex-shrink-0";
            
            const text = document.getElementById('serverStateText');
            text.innerText = "AWS Connected & Operational";
            text.className = "font-bold text-green-800 dark:text-green-400 text-lg";

            // Timestamp
            const timestamp = new Date(data.timestamp).toLocaleString();
            document.getElementById('lastUpdatedText').innerText = "Last Updated: " + timestamp;

            // CPU
            if(data.cpu_load !== undefined) {
                document.getElementById('cpuUsage').innerText = data.cpu_load + '%';
                document.getElementById('cpuBar').style.width = data.cpu_load + '%';
                document.getElementById('cpuStatus').innerText = data.cpu_load < 50 ? "(Excellent)" : (data.cpu_load < 80 ? "(Moderate)" : "(High Load)");
            }
            
            // RAM
            if(data.ram_used_mb !== undefined && data.ram_total_mb !== undefined) {
                const used = parseFloat(data.ram_used_mb);
                const total = parseFloat(data.ram_total_mb);
                const percent = ((used / total) * 100).toFixed(1);
                
                document.getElementById('ramUsage').innerText = used + ' MB / ' + total + ' MB';
                document.getElementById('ramPercent').innerText = percent + '% used';
                document.getElementById('ramBar').style.width = percent + '%';
            }
            
            // Disk
            if(data.disk_used_gb !== undefined && data.disk_total_gb !== undefined) {
                const used = parseFloat(data.disk_used_gb);
                const total = parseFloat(data.disk_total_gb);
                const percent = ((used / total) * 100).toFixed(1);
                
                document.getElementById('diskUsage').innerText = used + ' GB / ' + total + ' GB';
                document.getElementById('diskPercent').innerText = percent + '% used';
                document.getElementById('diskBar').style.width = percent + '%';
            }
            
            // Raw JSON View
            document.getElementById('jsonViewer').innerText = JSON.stringify(data, null, 2);
        }

        // Fetch on load
        fetchServerStatus();
        
        // Auto refresh every 30 seconds
        setInterval(fetchServerStatus, 30000);
    </script>
</body>
</html>
