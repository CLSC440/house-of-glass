<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Glass - Premium Poster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">

    <!-- Poster Container -->
    <div class="relative w-full max-w-5xl rounded-3xl overflow-hidden shadow-2xl bg-gradient-to-br from-black via-gray-900 to-gray-800 border border-yellow-600/30 p-10">
        
        <!-- Background Glow Effect -->
        <div class="absolute top-[20%] left-1/2 transform -translate-x-1/2 w-[600px] h-[600px] bg-yellow-500/10 rounded-full blur-[100px] pointer-events-none"></div>

        <!-- Poster Header (Logo & Title) -->
        <div class="relative flex flex-col items-center text-center mb-12 z-10">
            <img src="https://www.hg-alshour.online/logo.png" alt="House of Glass Logo" class="w-40 md:w-48 mb-6 drop-shadow-[0_0_15px_rgba(255,215,0,0.3)]">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 via-yellow-200 to-yellow-500 tracking-wide mb-2">أفخم إبداعاتنا</h1>
            <p class="text-gray-400 text-lg tracking-[0.2em] uppercase uppercase mt-2">Premium Home Glassware</p>
        </div>

        <!-- Products Showcase Grid -->
        <div class="relative z-10 grid grid-cols-1 md:grid-cols-3 gap-8 items-center">

            <!-- Left Col (2 Products) -->
            <div class="flex flex-col gap-8">
                <div class="bg-gray-800/50 p-4 rounded-2xl border border-gray-700/50 backdrop-blur-sm text-center transform hover:scale-105 transition duration-300">
                    <img src="https://ik.imagekit.io/HOG/products/ElsS9GJdYMc7xwJTAzEH/main/10036_main_1_UiGeun0sr.png" class="mx-auto h-40 object-contain drop-shadow-2xl">
                    <p class="text-yellow-400 font-bold mt-4">PIRLO SET | طقم قهوة بالطبق</p>
                </div>
                <div class="bg-gray-800/50 p-4 rounded-2xl border border-gray-700/50 backdrop-blur-sm text-center transform hover:scale-105 transition duration-300">
                    <img src="https://ik.imagekit.io/HOG/products/YvJe4xzNOFtheP5Zbt9k/variants/6223006782983_variant_1_1_tnTMHFGKG.png" class="mx-auto h-40 object-contain drop-shadow-2xl">
                    <p class="text-yellow-400 font-bold mt-4">ROYAL MUG | مج رويال مدهب</p>
                </div>
            </div>

            <!-- Center Col (Masterpiece) -->
            <div class="flex flex-col justify-center items-center bg-gradient-to-t from-yellow-900/20 to-transparent p-6 rounded-3xl border border-yellow-500/40 transform hover:scale-110 transition duration-500 shadow-[0_0_30px_rgba(255,215,0,0.15)] relative">
                <div class="absolute -top-4 bg-gradient-to-r from-yellow-600 to-yellow-400 text-black px-4 py-1 rounded-full text-sm font-bold shadow-lg">The Masterpiece</div>
                <img src="https://ik.imagekit.io/HOG/products/L2zwRnOVsDLcNWUo26sl/variants/680678591651_variant_1_1_BC4bAtcOn.png" class="mx-auto h-64 object-contain drop-shadow-[0_20px_20px_rgba(0,0,0,0.8)] mt-4">
                <h3 class="text-white text-2xl font-bold mt-6 whitespace-nowrap">AMORE</h3>
                <p class="text-yellow-200 text-sm">شوب امور تركي الوان</p>
            </div>

            <!-- Right Col (2 Products) -->
            <div class="flex flex-col gap-8">
                <div class="bg-gray-800/50 p-4 rounded-2xl border border-gray-700/50 backdrop-blur-sm text-center transform hover:scale-105 transition duration-300">
                    <img src="https://ik.imagekit.io/HOG/products/w29FsghlGOdN5gAYdcSh/main/6224002435477_main_1_Qfck7gxcW.jpg" class="mx-auto h-40 object-contain drop-shadow-2xl rounded-lg">
                    <p class="text-yellow-400 font-bold mt-4">GOLD WATER SET | طقم جولد</p>
                </div>
                <div class="bg-gray-800/50 p-4 rounded-2xl border border-gray-700/50 backdrop-blur-sm text-center transform hover:scale-105 transition duration-300">
                    <img src="https://ik.imagekit.io/HOG/products/fTG3qkNGAb1IMpmMOoYL/main/8693357461871_main_1_k9AyvGgd9.jpg" class="mx-auto h-40 object-contain drop-shadow-2xl rounded-lg">
                    <p class="text-yellow-400 font-bold mt-4">AQUATIC | شوب اكواتيك</p>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="mt-12 text-center text-gray-500 text-sm border-t border-gray-700/50 pt-4">
            تألق في كل انعكاس | Excellence in every reflection
        </div>
    </div>

</body>
</html>
