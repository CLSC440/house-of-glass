<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Of Glass | Server Status</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#121926',
                        brandGold: '#D4AF37',
                        darkBg: '#030712',
                        darkCard: '#111827'
                    },
                    fontFamily: {
                        arabic: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }

        function applySmartTheme() {
            const manualTheme = localStorage.getItem('darkMode');
            if (manualTheme === 'true') document.documentElement.classList.add('dark');
            else if (manualTheme === 'false') document.documentElement.classList.remove('dark');
            else {
                const hour = new Date().getHours();
                if (hour < 6 || hour >= 18) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }
        }
        applySmartTheme();
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-darkBg font-sans text-gray-800 dark:text-gray-200 transition-colors duration-300">

    <header class="bg-white dark:bg-brandBlue border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 h-16 md:h-20 flex justify-between items-center relative">
            <div class="flex items-center space-x-2 md:space-x-4">
                <a href="admin.html" class="flex items-center space-x-2 md:space-x-3 group">
                    <img src="logo.png" alt="Logo" class="h-16 md:h-20 w-auto transition-all group-hover:scale-105">
                    <div class="flex flex-col">
                        <span class="text-xl md:text-2xl font-black text-brandBlue dark:text-brandGold tracking-tighter leading-none italic uppercase">Admin</span>
                        <span class="text-[8px] md:text-[10px] text-brandBlue/60 dark:text-brandGold/60 font-medium tracking-[0.2em] uppercase block">Server Status</span>
                    </div>
                </a>
            </div>
            <div class="flex gap-2">
                <a href="admin.html" class="px-4 py-2 bg-brandBlue text-white rounded-full text-xs font-bold hover:bg-brandGold transition-colors">
                    &larr; Back to Admin
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-black text-brandBlue dark:text-brandGold uppercase italic tracking-tighter mb-8 text-center" dir="rtl">
            Server Status <span class="text-sm font-arabic block mt-2 text-gray-500">حالة السيرفر</span>
        </h1>

        <!-- Overall Status Banner -->
        <div id="statusBanner" class="p-6 rounded-2xl bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 flex items-center gap-4 mb-8 transition-all">
            <div class="w-4 h-4 rounded-full bg-green-500 animate-pulse flex-shrink-0"></div>
            <div>
                <h3 class="font-bold text-green-800 dark:text-green-400 text-lg" id="serverStateText">All Systems Operational</h3>
                <p class="text-sm text-green-700 dark:text-green-500 opacity-80" id="lastUpdatedText">Last verified: just now</p>
            </div>
            <div class="ml-auto">
                <button onclick="fetchServerStatus()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-bold rounded-xl transition-all shadow-sm">
                    Refresh
                </button>
            </div>
        </div>

        <!-- Metrics Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8 lg:mb-12">
            <!-- CPU Card -->
            <div class="bg-white dark:bg-darkCard p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-medium text-gray-500 dark:text-gray-400 text-sm">CPU Usage</h3>
                    <svg class="w-6 h-6 text-brandGold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                </div>
                <div class="text-3xl font-black text-brandBlue dark:text-white" id="cpuUsage">--%</div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mt-4">
                    <div class="bg-brandGold h-2 rounded-full transition-all duration-500" id="cpuBar" style="width: 0%"></div>
                </div>
            </div>

            <!-- RAM Card -->
            <div class="bg-white dark:bg-darkCard p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-medium text-gray-500 dark:text-gray-400 text-sm">Memory (RAM)</h3>
                    <svg class="w-6 h-6 text-brandGold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <div class="text-3xl font-black text-brandBlue dark:text-white" id="ramUsage">-- / --</div>
                <p class="text-xs text-gray-400 mt-2" id="ramPercent">--% used</p>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mt-2">
                    <div class="bg-brandBlue dark:bg-brandGold h-2 rounded-full transition-all duration-500" id="ramBar" style="width: 0%"></div>
                </div>
            </div>

            <!-- Disk Card -->
            <div class="bg-white dark:bg-darkCard p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-medium text-gray-500 dark:text-gray-400 text-sm">Disk Storage</h3>
                    <svg class="w-6 h-6 text-brandGold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                </div>
                <div class="text-3xl font-black text-brandBlue dark:text-white" id="diskUsage">-- GB</div>
                <p class="text-xs text-gray-400 mt-2" id="diskPercent">Free Space</p>
            </div>

            <!-- Uptime Card -->
            <div class="bg-white dark:bg-darkCard p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-medium text-gray-500 dark:text-gray-400 text-sm">Uptime</h3>
                    <svg class="w-6 h-6 text-brandGold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div class="text-3xl font-black text-brandBlue dark:text-white" id="uptime">--:--:--</div>
                <p class="text-xs text-green-500 mt-2">Online</p>
            </div>
        </div>

        <!-- Details Section / Logs -->
        <div class="bg-white dark:bg-darkCard rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50">
                <h3 class="font-bold text-brandBlue dark:text-brandGold">Detailed Server Information</h3>
            </div>
            <div class="p-6">
                <pre id="jsonViewer" class="bg-gray-900 text-green-400 p-4 rounded-xl text-sm overflow-x-auto h-64 font-mono">Loading data...</pre>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        //         حُط الـ API بتاعك هنا 
        // ==========================================
        const SERVER_API_URL = "YOUR_API_ENDPOINT_HERE";

        async function fetchServerStatus() {
            try {
                // If API URL is set, fetch it. Else mock it.
                if (SERVER_API_URL === "YOUR_API_ENDPOINT_HERE") {
                    mockFetchAndRender();
                    return;
                }

                const response = await fetch(SERVER_API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                renderData(data);
                
            } catch (error) {
                console.error('Error fetching server status:', error);
                
                // Show Error state
                document.getElementById('statusBanner').className = "p-6 rounded-2xl bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 flex items-center gap-4 mb-8";
                document.getElementById('statusBanner').querySelector('.animate-pulse').className = "w-4 h-4 rounded-full bg-red-500 animate-pulse flex-shrink-0";
                document.getElementById('serverStateText').innerText = "System Offline or Cannot Connect";
                document.getElementById('serverStateText').className = "font-bold text-red-800 dark:text-red-400 text-lg";
                document.getElementById('lastUpdatedText').innerText = "Fetch failed";
                document.getElementById('lastUpdatedText').className = "text-sm text-red-700 dark:text-red-500 opacity-80";
                document.getElementById('jsonViewer').innerText = "Error: " + error.message;
            }
        }

        function renderData(data) {
            // Update UI with the data from API
            // Note: Update these mapping keys based on what your actual API returns!
            
            // Example mappings:
            // data.cpu = 45 
            if(data.cpu !== undefined) {
                document.getElementById('cpuUsage').innerText = data.cpu + '%';
                document.getElementById('cpuBar').style.width = data.cpu + '%';
            }
            
            // data.ram = { used: "4GB", total: "16GB", percent: 25 }
            if(data.ram !== undefined) {
                document.getElementById('ramUsage').innerText = data.ram.used + ' / ' + data.ram.total;
                document.getElementById('ramPercent').innerText = data.ram.percent + '% used';
                document.getElementById('ramBar').style.width = data.ram.percent + '%';
            }
            
            // data.disk = { free: "120GB" }
            if(data.disk !== undefined) {
                document.getElementById('diskUsage').innerText = data.disk.free;
            }
            
            // data.uptime = "14d 5h 20m"
            if(data.uptime !== undefined) {
                document.getElementById('uptime').innerText = data.uptime;
            }

            document.getElementById('jsonViewer').innerText = JSON.stringify(data, null, 2);

            // Update timestamp
            document.getElementById('lastUpdatedText').innerText = "Last updated: " + new Date().toLocaleTimeString();
        }

        function mockFetchAndRender() {
            // This is just a simulation so the UI looks nice until you add your real API.
            const mockData = {
                status: "Operational",
                cpu: Math.floor(Math.random() * 30) + 10, // 10-40%
                ram: {
                    used: (Math.random() * 2 + 2).toFixed(1) + "GB",
                    total: "8GB",
                    percent: Math.floor(Math.random() * 40) + 30
                },
                disk: {
                    free: "245GB"
                },
                uptime: "30 Days, 5 Hours",
                servers: [
                    { name: "Database", status: "Healthy", ping: "15ms" },
                    { name: "Storage Box", status: "Healthy", ping: "22ms" },
                ]
            };
            
            document.getElementById('statusBanner').className = "p-6 rounded-2xl bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 flex items-center gap-4 mb-8";
            document.getElementById('serverStateText').innerText = "All Systems Operational";
            document.getElementById('serverStateText').className = "font-bold text-green-800 dark:text-green-400 text-lg";
            
            renderData(mockData);
        }

        // Fetch initially
        fetchServerStatus();
        
        // Auto refresh every 30 seconds
        setInterval(fetchServerStatus, 30000);
    </script>
</body>
</html>
